<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#f4f3ee">
<meta name="description" content="雅思高频考点词背诵 · 阅读 538 + 听力 179 · 自选背词周期 · 同义替换 · 真人发音 · 小游戏 · 单词故事 · 进度自动保存">
<title>雅思考点词背诵 · 阅读 538 + 听力 179</title>
<style>
:root{
  --paper:#f4f3ee; --surface:#ffffff; --surface-2:#fbfaf6;
  --ink:#20292b; --ink-soft:#54605e; --muted:#8b938f; --line:#e7e3da; --line-2:#efece4;
  --honey:#cf8a1f; --honey-d:#a96e12; --honey-soft:#f7edd6;
  --jade:#3a9472; --jade-d:#2c7558; --jade-soft:#e4f1ea;
  --coral:#d9633f; --coral-d:#b94c2b; --coral-soft:#fbe6dd;
  --cat1:#b3400c; --cat1-bg:#fbe7dd; --cat2:#9a6410; --cat2-bg:#f6ecd6; --cat3:#5f6b6a; --cat3-bg:#ecefed;
  --r:16px; --r-sm:11px; --r-lg:22px;
  --sh:0 6px 26px rgba(26,30,28,.07),0 1px 2px rgba(26,30,28,.05);
  --sh-lg:0 14px 40px rgba(26,30,28,.13);
  --maxw:640px; --tab-h:62px;
  --f-ui:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
  --f-word:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
  --f-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--f-ui);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px}
.topbar{position:sticky;top:0;z-index:30;background:rgba(244,243,238,.86);backdrop-filter:saturate(160%) blur(12px);-webkit-backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line-2)}
.topbar .wrap{display:flex;align-items:center;gap:10px;height:54px}
.brand{font-weight:800;letter-spacing:.2px;font-size:16px;display:flex;align-items:center;gap:8px}
.brand .dot{width:10px;height:10px;border-radius:3px;background:var(--honey);box-shadow:0 0 0 4px var(--honey-soft)}
.brand small{font-weight:600;color:var(--muted);font-size:12px;margin-left:2px}
.topbar .grow{flex:1}
.iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--ink-soft);border:1px solid var(--line);background:var(--surface);font-size:17px}
.iconbtn:active{transform:scale(.94)}
main{padding:18px 0 calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 18px)}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(251,250,246,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line-2);padding-bottom:env(safe-area-inset-bottom,0px)}
.tabbar .wrap{display:flex;height:var(--tab-h);padding:0 6px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;border-top:2px solid transparent;margin-top:-1px}
.tab .ic{font-size:20px;line-height:1}
.tab.on{color:var(--honey-d);border-top-color:var(--honey)}
.tab:active{transform:translateY(1px)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.sec-t{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.6px;margin:24px 4px 10px}
.sec-t.first{margin-top:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 18px;border-radius:13px;font-weight:700;font-size:15px;background:var(--ink);color:#fff;transition:transform .08s,filter .15s;width:100%}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.btn.honey{background:var(--honey)}
.btn.jade{background:var(--jade)}
.btn.sm{padding:9px 13px;font-size:13px;border-radius:10px;width:auto}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;font-size:13px;font-weight:600;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.3px;white-space:nowrap}
.b1{background:var(--cat1-bg);color:var(--cat1)} .b2{background:var(--cat2-bg);color:var(--cat2)} .b3{background:var(--cat3-bg);color:var(--cat3)}
.row{display:flex;gap:10px}
.row.wrapr{flex-wrap:wrap}
.muted{color:var(--muted)} .soft{color:var(--ink-soft)} .center{text-align:center}
.note{margin-top:16px;padding:14px 16px;border-radius:14px;background:var(--surface-2);border:1px solid var(--line);font-size:13.5px;line-height:1.65;color:var(--ink-soft)}
.note b{color:var(--ink)}
.kbd{font-family:var(--f-mono);background:var(--line-2);padding:1px 6px;border-radius:6px;font-size:12px}

/* hero / plan */
.hero{padding:22px 20px;display:flex;gap:20px;align-items:center}
.ring{position:relative;flex:0 0 auto;width:118px;height:118px}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .pct b{font-size:27px;font-weight:800;font-family:var(--f-mono);line-height:1}
.ring .pct span{font-size:11px;color:var(--muted);margin-top:3px}
.hero-info{flex:1;min-width:0}
.hero-info h2{margin:0 0 4px;font-size:19px;font-weight:800}
.hero-info .big{font-family:var(--f-mono);font-size:13px;color:var(--ink-soft);margin-bottom:10px}
.hero-info .big b{color:var(--ink);font-size:15px}
.deadline{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border-radius:10px;background:var(--honey-soft);color:var(--honey-d);font-weight:700;font-size:13px}
.nudge{margin-top:14px;padding:14px 16px;border-radius:14px;display:flex;gap:11px;align-items:flex-start;font-size:14px;line-height:1.55}
.nudge .em{font-size:20px;line-height:1.2}
.nudge.warn{background:var(--coral-soft);color:#9c3d22}
.nudge.go{background:var(--jade-soft);color:#1f6e51}
.nudge.flat{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.stat{padding:14px 8px;text-align:center}
.stat b{display:block;font-size:22px;font-weight:800;font-family:var(--f-mono);line-height:1.1}
.stat span{font-size:12px;color:var(--muted);margin-top:4px;display:block}
.stat.j b{color:var(--jade)} .stat.h b{color:var(--honey-d)} .stat.c b{color:var(--coral)}
.scopelist{display:flex;flex-direction:column;gap:10px}
.scope{display:flex;align-items:center;gap:13px;padding:15px 16px;text-align:left;width:100%}
.scope .si{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex:0 0 auto}
.scope .stt{flex:1;min-width:0}
.scope .stt b{display:block;font-weight:700;font-size:15px}
.scope .stt span{font-size:13px;color:var(--muted)}
.scope .sn{font-family:var(--f-mono);font-weight:800;font-size:16px;color:var(--ink-soft)}
.scope .arrow{color:var(--muted);font-size:18px;margin-left:2px}
.scope:active{transform:scale(.99)}
.bg-h{background:var(--honey-soft);color:var(--honey-d)} .bg-j{background:var(--jade-soft);color:var(--jade)}
.bg-c{background:var(--coral-soft);color:var(--coral)} .bg-n{background:var(--surface-2);color:var(--ink-soft)}
.bg-p{background:#eee6f3;color:#7a4ea0}
.days{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
.day{padding:11px 6px;text-align:center;border-radius:13px;border:1px solid var(--line);background:var(--surface)}
.day .dl{font-size:11px;color:var(--muted);font-weight:700}
.day .dn{font-family:var(--f-mono);font-weight:800;font-size:15px;margin-top:3px}
.day .db{height:5px;border-radius:3px;background:var(--line-2);margin-top:7px;overflow:hidden}
.day .db i{display:block;height:100%;background:var(--jade);border-radius:3px}
.day.now{border-color:var(--honey);box-shadow:0 0 0 3px var(--honey-soft)}
.day.doned .dn{color:var(--jade)}

/* session */
.session-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.session-top .x{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;font-size:16px;color:var(--ink-soft);flex:0 0 auto}
.pbar{flex:1;height:9px;border-radius:6px;background:var(--line-2);overflow:hidden}
.pbar i{display:block;height:100%;background:var(--honey);border-radius:6px;transition:width .25s}
.pcount{font-family:var(--f-mono);font-size:13px;font-weight:700;color:var(--ink-soft);flex:0 0 auto}

/* flashcard */
.fcard{position:relative;min-height:430px;padding:26px 22px;display:flex;flex-direction:column;justify-content:center}
.corner{position:absolute;top:12px;right:12px}
.fav{width:40px;height:40px;border-radius:12px;font-size:20px;color:var(--muted);background:var(--surface-2);border:1px solid var(--line)}
.fav.on{color:var(--honey);background:var(--honey-soft);border-color:var(--honey-soft)}
.fav:active{transform:scale(.9)}
.top-area{text-align:center}
.word{font-family:var(--f-word);font-size:46px;font-weight:600;letter-spacing:.3px;word-break:break-word;line-height:1.1}
.word.long{font-size:34px}
.ipa{font-family:var(--f-mono);color:var(--muted);font-size:16px;margin-top:8px}
.speak{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:11px;background:var(--honey-soft);color:var(--honey-d);font-weight:700;font-size:14px;margin-top:14px;transition:transform .1s}
.speak:active{transform:scale(.94)}
.speak.playing{animation:pulse .7s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.speak.mini{padding:5px 9px;font-size:12px;margin:0}
.tap-hint{text-align:center;color:var(--muted);font-size:13px;margin-top:24px;animation:floaty 2.2s ease infinite}
@keyframes floaty{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-3px);opacity:1}}
.reveal{text-align:center}
.cn{font-size:21px;font-weight:700;margin:14px 0 12px;line-height:1.5}
.kao{margin:16px 0 4px;text-align:left;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:14px}
.kao .lab{font-size:12.5px;font-weight:700;color:var(--honey-d);margin-bottom:11px;line-height:1.4}
.synwrap{display:flex;flex-wrap:wrap;gap:9px}
.syncard{display:inline-flex;align-items:center;gap:8px;padding:8px 9px 8px 13px;border-radius:12px;background:var(--surface);border:1px solid var(--line);box-shadow:0 1px 2px rgba(26,30,28,.05)}
.syncard .sw{font-family:var(--f-word);font-size:16px;font-weight:600;color:var(--ink)}
.syncard .sgo{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--jade-d);background:var(--jade-soft);padding:3px 7px;border-radius:8px}
.syncard .sgo:active{transform:scale(.92)}
.syncard .sp{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;font-size:13px;background:var(--honey-soft);color:var(--honey-d)}
.syncard .sp:active{transform:scale(.9)}
.tipbox{margin-top:14px;padding:13px 15px;border-radius:13px;background:var(--jade-soft);color:var(--jade-d);font-size:14px;line-height:1.6;text-align:left}
.dictrow{display:flex;gap:10px;margin-top:14px}
.dictrow a{flex:1;text-align:center;padding:11px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);font-weight:700;font-size:14px;color:var(--ink-soft)}
.dictrow a:active{transform:scale(.98)}
.rate{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.rate button{padding:14px 6px;border-radius:14px;font-weight:800;font-size:15px;display:flex;flex-direction:column;align-items:center;gap:3px;border:1.5px solid;transition:transform .08s}
.rate button small{font-weight:600;font-size:11px;opacity:.8}
.rate button:active{transform:scale(.96)}
.rate .again{background:var(--coral-soft);color:var(--coral-d);border-color:#f0c9bb}
.rate .vague{background:var(--honey-soft);color:var(--honey-d);border-color:#ecd9a8}
.rate .knownb{background:var(--jade-soft);color:var(--jade-d);border-color:#bfe0ce}

/* summary */
.summary{text-align:center;padding:34px 22px}
.summary .lab{font-size:15px;color:var(--ink-soft);line-height:1.6}
.summary .big{font-family:var(--f-mono);font-size:40px;font-weight:800}
.sgrid{display:flex;justify-content:center;gap:30px;margin:18px 0 22px}
.sgrid b{display:block;font-size:30px;font-family:var(--f-mono);font-weight:800}
.sgrid span{font-size:12px}

/* word list items */
.wlist{display:flex;flex-direction:column;gap:8px}
.witem{display:flex;align-items:center;gap:11px;padding:13px 14px;text-align:left;width:100%}
.dotk{width:9px;height:9px;border-radius:3px;flex:0 0 auto;background:var(--line)}
.dotk.m0{background:var(--coral)} .dotk.m1{background:var(--honey)} .dotk.m2{background:var(--jade)}
.wmain{flex:1;min-width:0}
.ww{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--f-word);font-size:17px;font-weight:600}
.wc{display:block;font-size:13px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wfav{font-size:19px;color:var(--muted);flex:0 0 auto;padding:4px}
.wfav.on{color:var(--honey)}

/* library search/filter */
.searchbar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:8px 12px;margin-bottom:12px;box-shadow:var(--sh)}
.searchbar .mag{color:var(--muted)}
.searchbar input{flex:1;border:none;outline:none;background:none;font-size:15px;color:var(--ink);min-width:0}
.filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;align-items:center}
.fbtn{padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft)}
.fbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.loadmore{margin-top:12px}

/* empty state */
.emptyst{text-align:center;padding:56px 26px;color:var(--muted)}
.emptyst .em{font-size:46px;margin-bottom:10px}

/* collections (我的) */
.coltri{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.coltri button{padding:16px 8px;text-align:center;border-radius:16px;border:1.5px solid;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .08s}
.coltri button:active{transform:scale(.97)}
.coltri .n{font-family:var(--f-mono);font-size:26px;font-weight:800;line-height:1}
.coltri .l{font-size:12.5px;font-weight:700}
.coltri .e{font-size:18px}
.col0{background:var(--coral-soft);border-color:#f0c9bb;color:var(--coral-d)}
.col1{background:var(--honey-soft);border-color:#ecd9a8;color:var(--honey-d)}
.col2{background:var(--jade-soft);border-color:#bfe0ce;color:var(--jade-d)}

/* games hub */
.gamegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gcard{padding:18px 16px;border-radius:18px;text-align:left;display:flex;flex-direction:column;gap:6px;min-height:118px;justify-content:space-between;transition:transform .1s}
.gcard:active{transform:scale(.98)}
.gcard .ge{font-size:30px}
.gcard b{font-size:16px;font-weight:800}
.gcard span{font-size:12.5px;color:var(--muted);line-height:1.45}

/* matching game */
.matchwrap{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:6px}
.mcol{display:flex;flex-direction:column;gap:10px}
.mtile{padding:15px 12px;border-radius:14px;border:1.5px solid var(--line);background:var(--surface);font-weight:600;text-align:center;min-height:56px;display:flex;align-items:center;justify-content:center;line-height:1.35;transition:transform .1s,background .15s,border-color .15s}
.mtile.en{font-family:var(--f-word);font-size:18px}
.mtile.zh{font-size:14px}
.mtile:active{transform:scale(.97)}
.mtile.sel{border-color:var(--honey);background:var(--honey-soft);color:var(--honey-d)}
.mtile.matched{border-color:var(--jade-soft);background:var(--jade-soft);color:var(--jade-d);opacity:.55;pointer-events:none}
.mtile.bad{border-color:var(--coral);background:var(--coral-soft);color:var(--coral-d);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.gtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px;font-weight:700;color:var(--ink-soft)}
.gtop .gx{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--ink-soft)}
.gtop .gmeta{font-family:var(--f-mono)}

/* quiz */
.q-word{font-family:var(--f-word);font-size:42px;font-weight:600;text-align:center;line-height:1.1;word-break:break-word}
.q-word.long{font-size:30px}
.q-cn{font-size:26px;font-weight:700;text-align:center;line-height:1.4}
.q-sub{text-align:center;color:var(--muted);font-family:var(--f-mono);font-size:15px;margin-top:6px}
.qcard{padding:30px 20px}
.opts{display:flex;flex-direction:column;gap:11px;margin-top:18px}
.opt{display:flex;align-items:center;gap:12px;padding:15px 16px;border-radius:14px;border:1.5px solid var(--line);background:var(--surface);text-align:left;font-size:16px;font-weight:600;transition:transform .08s}
.opt:active{transform:scale(.985)}
.opt .k{width:26px;height:26px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--ink-soft);flex:0 0 auto}
.opt.right{border-color:var(--jade);background:var(--jade-soft);color:var(--jade-d)} .opt.right .k{background:var(--jade);color:#fff;border-color:var(--jade)}
.opt.wrong{border-color:var(--coral);background:var(--coral-soft);color:var(--coral-d)} .opt.wrong .k{background:var(--coral);color:#fff;border-color:var(--coral)}
.opt.dim{opacity:.45}
.qhint{margin-top:14px;padding:12px 15px;border-radius:12px;background:var(--honey-soft);color:var(--honey-d);font-size:14px;text-align:center;font-weight:600}

/* spelling */
.spcard{padding:28px 20px;text-align:center}
.sp-cn{font-size:24px;font-weight:700;line-height:1.4;margin-bottom:6px}
.sp-hint{font-family:var(--f-mono);letter-spacing:6px;font-size:22px;color:var(--muted);margin:14px 0}
.sp-input{width:100%;text-align:center;font-family:var(--f-word);font-size:30px;font-weight:600;padding:12px;border:none;border-bottom:2px solid var(--line);outline:none;background:none;color:var(--ink)}
.sp-input:focus{border-bottom-color:var(--honey)}
.sp-input.ok{border-bottom-color:var(--jade);color:var(--jade-d)}
.sp-input.no{border-bottom-color:var(--coral);color:var(--coral-d)}
.sp-actions{display:flex;gap:10px;margin-top:20px}
.sp-actions .btn{flex:1}
.sp-reveal{margin-top:16px;font-family:var(--f-word);font-size:24px;font-weight:600;color:var(--jade-d)}

/* stories */
.storylist{display:flex;flex-direction:column;gap:12px}
.storycard{padding:17px 18px;text-align:left;width:100%;display:flex;gap:14px;align-items:center}
.storycard .se{font-size:32px;flex:0 0 auto}
.storycard .stt{flex:1;min-width:0}
.storycard .stt b{font-size:16px;font-weight:800;display:block}
.storycard .stt span{font-size:13px;color:var(--muted)}
.storyread{padding:22px 20px}
.storyread h2{font-family:var(--f-word);font-size:25px;font-weight:600;margin:0 0 4px}
.storyread .stheme{font-size:13px;color:var(--muted);margin-bottom:16px}

.tw{color:var(--honey-d);font-weight:600;border-bottom:1.5px dotted var(--honey);cursor:pointer;padding:0 1px}
.tw:active{background:var(--honey-soft)}
.storyvocab{margin-top:20px}
.storyvocab .lab{font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:10px}

/* modal / bottom sheet */
.modal{position:fixed;inset:0;z-index:60;display:none}
.modal.open{display:block}
.modal .sc{position:absolute;inset:0;background:rgba(20,24,22,.42)}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;padding:8px 18px calc(env(safe-area-inset-bottom,0px) + 22px);max-width:var(--maxw);margin:0 auto;animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet .grab{width:42px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 12px}

/* toast */
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(var(--tab-h) + 22px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:13px;font-size:14px;font-weight:600;z-index:80;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:var(--sh-lg);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.foot{text-align:center;color:var(--muted);font-size:12px;line-height:1.7;margin:30px 4px 4px;padding:0 4px}
.foot a{color:var(--honey-d);font-weight:600}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.b0{background:var(--cat3-bg);color:var(--cat3)}
.libsw{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.libtab{padding:12px 13px;border-radius:14px;border:1px solid var(--line);background:var(--surface);text-align:left;transition:transform .08s}
.libtab b{display:block;font-size:14.5px;font-weight:800;color:var(--ink)}
.libtab span{display:block;font-size:11px;color:var(--muted);font-family:var(--f-mono);margin-top:3px}
.libtab.on{border-color:var(--honey);background:var(--honey-soft);box-shadow:0 0 0 3px var(--honey-soft)}
.libtab.on b{color:var(--honey-d)}
.libtab:active{transform:scale(.98)}
.planhdr{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
.cyedit{font-size:12px;font-weight:700;color:var(--honey-d);background:var(--honey-soft);padding:6px 11px;border-radius:10px;margin:24px 4px 10px;white-space:nowrap}
.cyedit:active{transform:scale(.96)}
.cygrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:8px 0 14px}
.cyopt{padding:10px 4px;border-radius:12px;border:1.5px solid var(--line);background:var(--surface-2);font-weight:800;font-size:14px;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:2px}
.cyopt small{font-weight:600;font-size:10px;color:var(--muted)}
.cyopt.on{border-color:var(--honey);background:var(--honey-soft);color:var(--honey-d)}
.cyopt.on small{color:var(--honey-d)}
.cyopt:active{transform:scale(.95)}
.cynum{width:84px;padding:9px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:15px;font-family:var(--f-mono);text-align:center;color:var(--ink)}
.pop{position:fixed;z-index:90;max-width:300px;min-width:198px;left:0;top:0;opacity:0;transform:translateY(4px) scale(.97);pointer-events:none;transition:opacity .14s ease,transform .14s ease}

.speak.big{font-size:17px;padding:13px 24px;border-radius:14px}

.dc-cn{margin-top:14px;background:none;border:none;color:var(--honey-d);font-size:12.5px;font-weight:700;cursor:pointer}

.rm{font-size:12.5px;color:var(--muted)}
.rmeta{font-size:12px;color:var(--muted);font-family:var(--f-mono);white-space:nowrap;display:flex;align-items:center;gap:4px}

 text:"In a quiet park, a crow named Pip behaved in a way that seemed almost human. Pip could [[recognize|recognise]] the faces of people who had once fed her, and she would [[ignore]] strangers completely. Curious, scientists ran a careful [[experiment]] to [[detect]] whether her clever [[trait|traits]] were learned or [[innate]]. They set out two boxes; only one held food, and Pip soon learned to [[distinguish]] them by a small [[signal]] painted on the lid. Crows, it turns out, can [[adapt to|adapt to]] new puzzles with a [[swift]] mind, and they readily [[imitate]] one another. Some even drop hard nuts onto busy roads and let the passing wheels do the cracking — a clever [[mechanism]] no one ever taught them. The growing [[evidence]] suggests that the gap between a bird's brain and our own may [[resemble]] a narrow stream far more than a wide ocean."},

/* ===================== 基础工具 ===================== */
const SK = "ielts538_v3";
const SK2 = "ielts538_v2";
const SK1 = "ielts538_v1";
function curDays(){ return (S&&S.days)||(CURLIB&&CURLIB.defDays)||5; }
function perDay(){ return Math.ceil(N / curDays()); }
function assignDays(){ var TD=curDays(); WORDS.forEach(function(w,i){ w.idx=i; w.day=Math.min(TD, Math.floor(i*TD/Math.max(N,1))+1); }); }
function useLib(id){
  CURLIB = LIBRARIES[id] || LIBRARIES.reading;
  ROOT.active = CURLIB.id;
  S = ROOT.libs[CURLIB.id];
  if(!S.days) S.days = CURLIB.defDays;
  if(!S.start) S.start = todayStr();
  WORDS = CURLIB.words; N = WORDS.length;
  assignDays();
  byId = {}; WORDS.forEach(function(w){ byId[w.id]=w; });
  byWord = {}; WORDS.forEach(function(w){ byWord[w.w.toLowerCase()]=w.id; });
  var set={}; WORDS.forEach(function(w){ cleanSyns(w).forEach(function(s){ if(s.length<=18) set[s.toLowerCase()]=1; }); }); SYN_POOL = Object.keys(set);
  if(typeof LIB!=='undefined' && LIB){ LIB.cat=0; LIB.status=-9; LIB.q=''; LIB.limit=60; }
  save();
}
function replan(days){ S.days=days; S.start=todayStr(); assignDays(); save(); }

function defProg(days){ return {start:null, days:days||5, mark:{}, fav:{}, wrong:{}, log:{}}; }
function defRoot(){ return {v:3, active:"reading", libs:{ reading:defProg(LIBRARIES.reading.defDays), listening:defProg(LIBRARIES.listening.defDays) }, settings:{accent:"us"} }; }
var ROOT = loadRoot();
var S = null;
function loadRoot(){
  try{
    var r=localStorage.getItem(SK);
    if(r){ return normRoot(JSON.parse(r)); }
    var v2=localStorage.getItem(SK2);
    if(v2){ return fromOld(JSON.parse(v2)); }
    var v1=localStorage.getItem(SK1);
    if(v1){ var o1=JSON.parse(v1); return fromOld({start:o1.start, mark:o1.status, fav:o1.fav, wrong:o1.wrong, log:o1.log}); }
  }catch(e){}
  return defRoot();
}
function normRoot(o){
  var d=defRoot();
  if(o && o.libs){
    d.active = (o.active==="listening")?"listening":"reading";
    ["reading","listening"].forEach(function(k){ var p=Object.assign(defProg(LIBRARIES[k].defDays), o.libs[k]||{}); p.mark=p.mark||{}; p.fav=p.fav||{}; p.wrong=p.wrong||{}; p.log=p.log||{}; if(!p.days)p.days=LIBRARIES[k].defDays; d.libs[k]=p; });
    d.settings = Object.assign({accent:"us"}, o.settings);
  }
  return d;
}
function fromOld(o){
  var d=defRoot(), rp=d.libs.reading;
  rp.start = o.start||null; rp.days = 5;
  rp.mark = o.mark||{}; rp.fav = o.fav||{}; rp.wrong = o.wrong||{}; rp.log = o.log||{};
  if(o.settings) d.settings = Object.assign({accent:"us"}, o.settings);
  d.active="reading";
  return d;
}
var SAVE_OK=true;
function save(){
  try{ localStorage.setItem(SK, JSON.stringify(ROOT)); if(!SAVE_OK){SAVE_OK=true;} }
  catch(e){ if(SAVE_OK){ SAVE_OK=false; toast("⚠️ 此环境无法保存进度，请用 ⚙ 导出备份"); } }
}
function todayStr(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function daysSince(s){ var a=new Date(s+"T00:00:00"), b=new Date(todayStr()+"T00:00:00"); return Math.round((b-a)/86400000); }
function curDay(){ return (S&&S.start)? Math.max(1, daysSince(S.start)+1) : 1; }
function planDay(){ return Math.min(curDay(), curDays()); }
function isSprint(){ return curDay() > curDays(); }

/* mark: -1 未评 / 0 不认识 / 1 模糊 / 2 记得(掌握) */
function markOf(id){ return (id in S.mark)? S.mark[id] : -1; }
function setMark(id,v){ if(v<0) delete S.mark[id]; else S.mark[id]=v; }
function known(id){ return markOf(id)===2; }
function isFav(id){ return !!S.fav[id]; }
function toggleFav(id){ if(S.fav[id]) delete S.fav[id]; else S.fav[id]=1; save(); }
function logToday(){ var d=todayStr(); S.log[d]=S.log[d]||{studied:[],correct:0,wrong:0}; return S.log[d]; }
function markStudied(id){ var l=logToday(); if(l.studied.indexOf(id)<0) l.studied.push(id); }
function knownCount(){ return WORDS.filter(function(w){return known(w.id);}).length; }
function todayNew(){ var d=planDay(); return WORDS.filter(function(w){return w.day===d && !known(w.id);}); }
function overdue(){ var d=planDay(); return WORDS.filter(function(w){return w.day<d && !known(w.id);}); }
function todayTargets(){ return overdue().concat(todayNew()); }
function favList(){ return WORDS.filter(function(w){return isFav(w.id);}); }
function wrongListA(){ return WORDS.filter(function(w){return S.wrong[w.id];}); }
function unfinished(){ return WORDS.filter(function(w){return !known(w.id);}); }
function markList(v){ return WORDS.filter(function(w){return markOf(w.id)===v;}); }
function dayWords(d){ return WORDS.filter(function(w){return w.day===d;}); }
function dayDone(d){ return dayWords(d).filter(function(w){return known(w.id);}).length; }
function streak(){ var s=0, d=new Date(); while(true){ var k=todayStr(d), l=S.log[k]; if(l&&l.studied&&l.studied.length>0){ s++; d.setDate(d.getDate()-1);} else break; } return s; }
function synList(w){ return w.syn.split(/[;,]/).map(function(s){return s.trim();}).filter(function(s){return s && !/apply a to b/i.test(s);}); }
function cleanSyns(w){ return synList(w).filter(function(s){return /^[a-z][a-z' -]*$/i.test(s);}); }
/* SYN_POOL 由 useLib 按当前词库重新计算（见上） */

/* ---- 发音：有道真人音频 + 合成兜底 ---- */
var AU=null; try{ AU=new Audio(); AU.preload="none"; }catch(e){}
var lastBtn=null;
function playUI(btn){ if(lastBtn){lastBtn.classList.remove("playing");} if(btn){ btn.classList.add("playing"); lastBtn=btn; setTimeout(function(){ if(btn)btn.classList.remove("playing"); },1200);} }
function speak(text, btn){
  var word=String(text).replace(/\.\.\./g,'').trim();
  if(!word) return;
  if(btn) playUI(btn);
  var type = (ROOT.settings.accent==="uk")?1:2;
  if(AU){
    try{
      AU.onerror=function(){ tts(word); };
      AU.src="https://dict.youdao.com/dictvoice?audio="+encodeURIComponent(word)+"&type="+type;
      var p=AU.play();
      if(p && p.catch){ p.catch(function(){ tts(word); }); }
      return;
    }catch(e){}
  }
  tts(word);
}
function tts(word){
  try{
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(word);
    u.lang=(ROOT.settings.accent==="uk")?"en-GB":"en-US"; u.rate=.85;
    var vs=speechSynthesis.getVoices();
    var pref=(ROOT.settings.accent==="uk")?/en[-_]GB/i:/en[-_]US/i;
    var v=vs.filter(function(x){return pref.test(x.lang);})[0]||vs.filter(function(x){return /^en/i.test(x.lang);})[0];
    if(v)u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
if('speechSynthesis' in window){ try{speechSynthesis.getVoices();}catch(e){} }

function youdao(w){ return "https://www.youdao.com/result?word="+encodeURIComponent(w)+"&lang=en"; }
function bing(w){ return "https://cn.bing.com/dict/search?q="+encodeURIComponent(w); }

function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]);}); }
function jx(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function pick(arr,n,exclude){ var ex={}; (exclude||[]).forEach(function(x){ex[String(x).toLowerCase()]=1;}); var pool=arr.filter(function(x){return !ex[String(x).toLowerCase()];}); var out=[], cp=pool.slice(); while(out.length<n && cp.length){ out.push(cp.splice(Math.floor(Math.random()*cp.length),1)[0]); } return out; }
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
function fmtTime(ms){ var s=Math.round(ms/1000); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }

function showPop(anchor){
  var syn=anchor.getAttribute('data-syn')||'', hcn=anchor.getAttribute('data-cn')||'';
  var p=document.getElementById('pop'); if(!p) return;
  POP_FOR=anchor;
  p.innerHTML='<div class="pop-arrow"></div><div class="pop-in">'+synPopHTML(syn,hcn)+'</div>';
  p.classList.add('show');
  var r=anchor.getBoundingClientRect();
  var pw=p.offsetWidth, ph=p.offsetHeight, vw=window.innerWidth, vh=window.innerHeight;
  var left=r.left + r.width/2 - pw/2;
  left=Math.max(8, Math.min(left, vw-pw-8));
  var top=r.top - ph - 11, below=false;
  if(top<8){ top=r.bottom + 11; below=true; }
  if(below && top+ph>vh-8){ top=Math.max(8, vh-ph-8); }
  p.style.left=left+'px'; p.style.top=top+'px';
  p.classList.toggle('below',below);
  var ax=Math.max(14, Math.min(r.left + r.width/2 - left, pw-14));
  p.style.setProperty('--ax', ax+'px');
}
function hidePop(){ var p=document.getElementById('pop'); if(p){ p.classList.remove('show'); } POP_FOR=null; }
function synEnter(el){ if(POP_T){clearTimeout(POP_T);POP_T=null;} showPop(el); }
function synLeave(){ if(POP_T)clearTimeout(POP_T); POP_T=setTimeout(hidePop,260); }
function synTap(el,e){ if(e){e.stopPropagation();} if(POP_FOR===el){ hidePop(); } else { if(POP_T){clearTimeout(POP_T);POP_T=null;} showPop(el); } }

function chooseMatchMode(){
  view.innerHTML='<div class="session-top"><button class="x" onclick="go(\'play\')">✕</button><div style="flex:1;font-weight:800">配对方式</div></div>'+

     '<button class="card scope" onclick="startMatch(\'syn\')"><div class="si bg-h">🔁</div><div class="stt"><b>词 ↔ 同义替换</b><span>⭐ 雅思阅读真正考法</span></div><div class="arrow">›</div></button>'+
   '</div>';

var MG=null;
function startMatch(mode){
  var pool=GPool.slice();
  if(mode==='syn') pool=pool.filter(function(w){return cleanSyns(w).length>0;});
  if(pool.length<3){ toast('这批词太少或不适合该方式，换一个吧'); return; }
  MG={mode:mode, all:shuffle(pool).map(function(w){return w.id;}), done:0, total:Math.min(pool.length,999), moves:0, start:Date.now(), sel:null, batch:[]};
  nextMatchBatch();
}
function nextMatchBatch(){
  var remain=MG.all.slice(MG.done);
  var batch=remain.slice(0,Math.min(5,remain.length));
  if(!batch.length){ return matchDone(); }
  MG.batch=batch; MG.sel=null; MG.matchedInBatch=0;
  var lefts=shuffle(batch.map(function(id){return {id:id,side:'L'};}));
  var rights=shuffle(batch.map(function(id){return {id:id,side:'R'};}));
  var rightText=function(id){ var w=byId[id]; return MG.mode==='cn'? w.cn : cleanSyns(w)[0]; };
  function col(items,isLeft){
    return '<div class="mcol">'+items.map(function(it){
      var w=byId[it.id];
      var txt= isLeft? esc(w.w) : esc(rightText(it.id));
      return '<button class="mtile '+(isLeft?'en':'zh')+'" data-id="'+it.id+'" data-side="'+(isLeft?'L':'R')+'" onclick="matchTap('+it.id+',\''+(isLeft?'L':'R')+'\',this)">'+txt+'</button>';
    }).join('')+'</div>';
  }
  view.innerHTML=
    '<div class="gtop"><button class="gx" onclick="go(\'play\')">✕</button>'+
      '<div>已配 <b style="color:var(--jade)">'+MG.done+'</b> / '+MG.total+'</div>'+
      '<div class="gmeta">步数 '+MG.moves+'</div></div>'+
    '<div class="matchwrap">'+col(lefts,true)+col(rights,false)+'</div>'+
    '<div class="note" style="margin-top:16px">点一个英文，再点它对应的'+(MG.mode==='cn'?'中文':'同义词')+'。点错会抖一下，配对成功会变绿。</div>';
}
function matchTap(id,side,el){
  if(el.classList.contains('matched')) return;
  if(!MG.sel){ clearSel(); el.classList.add('sel'); MG.sel={id:id,side:side,el:el}; return; }
  if(MG.sel.el===el){ el.classList.remove('sel'); MG.sel=null; return; }
  if(MG.sel.side===side){ MG.sel.el.classList.remove('sel'); el.classList.add('sel'); MG.sel={id:id,side:side,el:el}; return; }
  MG.moves++;
  if(MG.sel.id===id){
    MG.sel.el.classList.remove('sel'); MG.sel.el.classList.add('matched'); el.classList.add('matched');
    MG.sel=null; MG.done++; MG.matchedInBatch++;
    speak(byId[id].w);
    var meta=view.querySelector('.gmeta'); if(meta)meta.textContent='步数 '+MG.moves;
    var hd=view.querySelector('.gtop b'); if(hd)hd.textContent=MG.done;
    if(MG.matchedInBatch===MG.batch.length){ setTimeout(nextMatchBatch,420); }
  } else {
    var a=MG.sel.el, b=el; a.classList.remove('sel'); a.classList.add('bad'); b.classList.add('bad');
    if(S.wrong){ /* 记错词：把这次点错的两个加入错题本 */ S.wrong[MG.sel.id]=1; S.wrong[id]=1; save(); }
    var sa=MG.sel; MG.sel=null;
    setTimeout(function(){ a.classList.remove('bad'); b.classList.remove('bad'); },420);
    var meta2=view.querySelector('.gmeta'); if(meta2)meta2.textContent='步数 '+MG.moves;
  }
}

function chooseQuizMode(){

     '<button class="card scope" onclick="beginQuiz(\'c2e\')"><div class="si bg-h">中→🔤</div><div class="stt"><b>看中文 选英文</b><span>反向巩固拼写印象</span></div><div class="arrow">›</div></button>'+
     '<button class="card scope" onclick="beginQuiz(\'syn\')"><div class="si bg-j">≈</div><div class="stt"><b>同义替换</b><span>⭐ 看考点词 选同义词</span></div><div class="arrow">›</div></button>'+
   '</div>';
}
var QZ=null;
function beginQuiz(mode){
  var pool=GPool.slice();
  if(mode==='syn') pool=pool.filter(function(w){return cleanSyns(w).length>0;});
  if(!pool.length){ toast('这批词不适合该题型，换一种吧'); chooseQuizMode(); return; }
  var qs=shuffle(pool).slice(0,Math.min(20,pool.length)).map(function(w){return w.id;});
  QZ={ mode:mode, ids:qs, pos:0, correct:0, wrong:0, tries:0 };
  renderQ();
}
function buildOptions(w,mode){
  if(mode==='e2c'){ var corr=w.cn; var ds=pick(WORDS.filter(function(x){return x.id!==w.id;}).map(function(x){return x.cn;}),3,[corr]); return {correct:corr, opts:shuffle([corr].concat(ds))}; }
  if(mode==='c2e'){ var corr2=w.w; var ds2=pick(WORDS.filter(function(x){return x.id!==w.id;}).map(function(x){return x.w;}),3,[corr2]); return {correct:corr2, opts:shuffle([corr2].concat(ds2))}; }
  var mine=cleanSyns(w); var corr3=mine[Math.floor(Math.random()*mine.length)];
  var exclude=mine.concat([w.w.toLowerCase()]); var ds3=pick(SYN_POOL,3,exclude); return {correct:corr3, opts:shuffle([corr3].concat(ds3))};
}
function renderQ(){
  if(QZ.pos>=QZ.ids.length){ return quizDone(); }
  var w=byId[QZ.ids[QZ.pos]]; var mode=QZ.mode;
  var ob=buildOptions(w,mode); QZ.cur={w:w, correct:ob.correct, mode:mode}; QZ.tries=0;
  var qlabel, promptHTML;
  if(mode==='e2c'){ qlabel='下面哪个是它的意思？'; var lw=w.w.length>13?' long':''; promptHTML='<div class="q-word'+lw+'">'+esc(w.w)+'</div>'+(w.ipa?'<div class="q-sub">'+esc(w.ipa)+'</div>':'')+'<div class="q-sub" style="margin-top:10px"><button class="speak mini" onclick="speak(\''+jx(w.w)+'\',this)">🔊 听</button></div>'; }
  else if(mode==='c2e'){ qlabel='下面哪个单词是这个意思？'; promptHTML='<div class="q-cn">'+esc(w.cn)+'</div>'; }
  else { qlabel='它的同义替换词是哪个？（雅思阅读考法）'; var lw2=w.w.length>13?' long':''; promptHTML='<div class="q-word'+lw2+'">'+esc(w.w)+'</div><div class="q-sub">'+esc(w.cn)+'</div>'; }
  var letters=['A','B','C','D'];
  var optsHTML=ob.opts.map(function(o,i){ return '<button class="opt" data-v="'+esc(o)+'" onclick="answer(this)"><span class="k">'+letters[i]+'</span><span>'+esc(o)+'</span></button>'; }).join('');
  view.innerHTML=
    '<div class="session-top"><button class="x" onclick="go(\'play\')">✕</button>'+
      '<div class="pbar"><i style="width:'+Math.round(QZ.pos/QZ.ids.length*100)+'%"></i></div>'+
      '<div class="pcount">'+(QZ.pos+1)+' / '+QZ.ids.length+'</div></div>'+
    '<div class="card qcard"><div class="muted center" style="font-size:13px;margin-bottom:4px">'+qlabel+'</div>'+promptHTML+'</div>'+
    '<div class="opts" id="opts">'+optsHTML+'</div>'+
    '<div id="qhintbox"></div>';
}
function answer(btn){
  var val=btn.getAttribute('data-v'); var cur=QZ.cur; var correct=cur.correct;
  var opts=document.getElementById('opts');
  if(val===correct){
    btn.classList.add('right');
    Array.prototype.forEach.call(opts.children,function(b){ b.onclick=null; if(b!==btn)b.classList.add('dim'); });
    if(QZ.tries===0){ QZ.correct++; if(S.wrong[cur.w.id])delete S.wrong[cur.w.id]; }
    save();
    if(cur.mode!=='e2c') speak(cur.w.w);
    setTimeout(function(){ QZ.pos++; renderQ(); }, 700);
  } else {
    btn.classList.add('wrong'); btn.onclick=null;
    QZ.tries++;
    if(QZ.tries===1){
      var hint;
      if(cur.mode==='c2e'||cur.mode==='syn'){ hint='提示：正确答案以 <b>'+esc(correct[0].toUpperCase())+'</b> 开头，共 '+correct.replace(/\s/g,'').length+' 个字母'; }
      else { hint='提示：再读一遍 <b>'+esc(cur.w.w)+'</b> '+(cur.w.ipa?esc(cur.w.ipa):'')+'，想想词根'; }
      document.getElementById('qhintbox').innerHTML='<div class="qhint">'+hint+'</div>';
    } else {
      QZ.wrong++; S.wrong[cur.w.id]=1; save();
      Array.prototype.forEach.call(opts.children,function(b){ b.onclick=null; if(b.getAttribute('data-v')===correct)b.classList.add('right'); });
      document.getElementById('qhintbox').innerHTML='<div class="qhint" style="background:var(--coral-soft);color:var(--coral-d)">答案：<b>'+esc(correct)+'</b> ·已收进错题本</div>';
      setTimeout(function(){ QZ.pos++; renderQ(); }, 1500);
    }
  }
}
function quizDone(){
  var total=QZ.ids.length, c=QZ.correct, wr=QZ.wrong; var rate=Math.round(c/total*100); QZ=null;
  var emoji=rate>=90?'🏆':rate>=70?'👏':rate>=50?'💪':'📚';
  var msg=rate>=90?'太强了！':rate>=70?'不错，继续保持':rate>=50?'再多刷几轮':'别灰心，重点攻错题';
  view.innerHTML='<div class="card summary"><div style="font-size:42px">'+emoji+'</div>'+
    '<div class="big" style="margin-top:8px;color:var(--honey-d)">'+rate+'%</div><div class="lab">一次答对率 · '+msg+'</div>'+
    '<div class="sgrid"><div><b style="color:var(--jade)">'+c+'</b><span class="muted">一次答对</span></div><div><b style="color:var(--coral)">'+wr+'</b><span class="muted">进错题本</span></div></div>'+
    '<div style="display:flex;flex-direction:column;gap:10px">'+
      (wr>0?'<button class="btn honey" onclick="GPool=wrongListA();GKind=\'quiz\';chooseQuizMode()">🩹 立刻攻克 '+wr+' 个错题</button>':'')+
      '<button class="btn ghost" onclick="gameSetup(\'quiz\')">再测一组</button>'+
      '<button class="btn ghost" onclick="go(\'play\')">回到闯关</button>'+
    '</div></div>';
}

/* ---- 拼写 ---- */
var SP=null;
function startSpell(){
  var pool=shuffle(GPool.slice()).slice(0,Math.min(12,GPool.length));
  SP={ids:pool.map(function(w){return w.id;}), pos:0, correct:0, wrong:0, revealed:false, tries:0};
  renderSpell();
}
function renderSpell(){
  if(SP.pos>=SP.ids.length){ return spellDone(); }
  var w=byId[SP.ids[SP.pos]]; SP.revealed=false; SP.tries=0;
  var mask=w.w.replace(/[a-z]/gi,'_').replace(/_/g,'_ ').trim();
  view.innerHTML=
    '<div class="session-top"><button class="x" onclick="go(\'play\')">✕</button>'+
      '<div class="pbar"><i style="width:'+Math.round(SP.pos/SP.ids.length*100)+'%"></i></div>'+
      '<div class="pcount">'+(SP.pos+1)+' / '+SP.ids.length+'</div></div>'+
    '<div class="card spcard">'+
      '<div class="sp-cn">'+esc(w.cn)+'</div>'+
      '<button class="speak" onclick="speak(\''+jx(w.w)+'\',this)">🔊 听单词</button>'+
      '<div class="sp-hint" id="spHint">'+mask+'</div>'+
      '<input class="sp-input" id="spIn" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="在这里拼写">'+
      '<div id="spMsg"></div>'+
    '</div>'+
    '<div class="sp-actions"><button class="btn ghost" onclick="spellHint()">提示首字母</button><button class="btn honey" onclick="spellCheck()">检查</button></div>'+
    '<div class="sp-actions" style="margin-top:10px"><button class="btn ghost" onclick="spellReveal()">看答案 · 下一个</button></div>';
  var inp=document.getElementById('spIn'); if(inp){ inp.focus(); inp.addEventListener('keydown',function(e){ if(e.key==='Enter')spellCheck(); }); }
}
function spellHint(){
  var w=byId[SP.ids[SP.pos]];
  var n=Math.min((SP.hintN||0)+1, w.w.length);
  SP.hintN=n;
  var shown=w.w.split('').map(function(ch,i){ return i<n?(/[a-z]/i.test(ch)?ch:ch):(/[a-z]/i.test(ch)?'_':ch); }).join(' ');
  document.getElementById('spHint').textContent=shown;
}
function spellCheck(){
  var w=byId[SP.ids[SP.pos]]; var inp=document.getElementById('spIn');
  var val=(inp.value||'').trim().toLowerCase();
  if(!val) return;
  if(val===w.w.toLowerCase()){
    inp.classList.remove('no'); inp.classList.add('ok');
    document.getElementById('spMsg').innerHTML='<div class="sp-reveal">✓ '+esc(w.w)+'</div>';
    if(SP.tries===0 && !SP.revealed){ SP.correct++; if(S.wrong[w.id])delete S.wrong[w.id]; save(); }
    speak(w.w);
    SP.hintN=0;
    setTimeout(function(){ SP.pos++; renderSpell(); }, 850);
  } else {
    SP.tries++; inp.classList.add('no');
    if(SP.tries===1){ document.getElementById('spMsg').innerHTML='<div class="qhint" style="background:var(--coral-soft);color:var(--coral-d)">还不对，再试一次，或点「提示首字母」</div>'; }
    else { document.getElementById('spMsg').innerHTML='<div class="qhint" style="background:var(--coral-soft);color:var(--coral-d)">正确拼写：<b>'+esc(w.w)+'</b></div>'; if(!SP._countedWrong){ SP.wrong++; S.wrong[w.id]=1; save(); SP._countedWrong=true; } }
  }
}
function spellReveal(){
  var w=byId[SP.ids[SP.pos]];
  if(!SP.revealed && SP.tries===0){ SP.wrong++; S.wrong[w.id]=1; save(); }
  SP.revealed=true; SP.hintN=0; SP._countedWrong=false;
  SP.pos++; renderSpell();
}
function spellDone(){
  var total=SP.ids.length, c=SP.correct, wr=SP.wrong; SP=null;
  var rate=Math.round(c/total*100); var emoji=rate>=80?'🏆':rate>=50?'💪':'📚';
  view.innerHTML='<div class="card summary"><div style="font-size:42px">'+emoji+'</div>'+
    '<div class="big" style="margin-top:8px;color:var(--honey-d)">'+c+' / '+total+'</div><div class="lab">一次拼对</div>'+
    '<div style="display:flex;flex-direction:column;gap:10px;margin-top:18px">'+
      '<button class="btn honey" onclick="gameSetup(\'spell\')">再练一组</button>'+
      '<button class="btn ghost" onclick="go(\'play\')">回到闯关</button>'+
    '</div></div>';
}

      return '<button class="card storycard" onclick="openStory('+i+')"><div class="se">'+s.emoji+'</div><div class="stt"><b>'+esc(s.title)+'</b><span>'+esc(s.zh)+' · '+n+' 个考点词</span></div><div class="arrow" style="color:var(--muted);font-size:18px">›</div></button>';

var STORY_RE=/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;
function countStoryWords(text){ var m,c=0; STORY_RE.lastIndex=0; while((m=STORY_RE.exec(text))){ if(byWord[m[1].toLowerCase()]!=null)c++; } return c; }
function renderStoryText(text){
  STORY_RE.lastIndex=0;
  return text.replace(STORY_RE,function(_,head,disp){
    var id=byWord[head.toLowerCase()];
    var show=disp||head;
    if(id==null) return '<b>'+esc(show)+'</b>';
    return '<span class="tw" onclick="openWord('+id+')">'+esc(show)+'</span>';
  });
}
function openStory(i){
  var s=STORIES[i];
  var ids=[]; var seen={}; STORY_RE.lastIndex=0; var m;
  while((m=STORY_RE.exec(s.text))){ var id=byWord[m[1].toLowerCase()]; if(id!=null&&!seen[id]){seen[id]=1;ids.push(id);} }
  view.innerHTML=
    '<div class="session-top"><button class="x" onclick="renderStories()">‹ 返回</button><div style="flex:1"></div><button class="iconbtn" onclick="speakStory('+i+')" title="朗读全文">🔊</button></div>'+
    '<div class="card storyread"><h2>'+esc(s.title)+'</h2><div class="stheme">'+s.emoji+' '+esc(s.zh)+'</div>'+
      '<div class="storytext">'+renderStoryText(s.text)+'</div>'+
      '<div class="storyvocab"><div class="lab">📒 本篇考点词（'+ids.length+'）· 点词查看</div><div class="wlist">'+ids.map(function(id){return wItem(byId[id]);}).join('')+'</div></div>'+
    '</div>'+
    '<div class="row" style="margin-top:12px"><button class="btn honey" onclick="GPool=['+ids.join(',')+'].map(function(x){return byId[x];});GKind=\'quiz\';chooseQuizMode()">📝 测一测本篇词</button></div>';
}
function speakStory(i){
  var plain=STORIES[i].text.replace(STORY_RE,function(_,h,d){return d||h;});
  speak(plain.length>200?plain.slice(0,200):plain);
}

  view.innerHTML=

    '</div>'+

     : '<div class="emptyst"><div class="em">🔎</div>没找到匹配的词，换个关键词试试</div>');

    if(box){ box.innerHTML=r.slice(0,LIB.limit).map(wItem).join(''); } }; }
}
function filterLib(){
  var q=LIB.q.trim().toLowerCase();
  return WORDS.filter(function(w){
    if(LIB.cat && w.cat!==LIB.cat) return false;
    if(LIB.status===9){ if(!isFav(w.id))return false; }
    else if(LIB.status!==-9 && markOf(w.id)!==LIB.status) return false;
    if(q){ return w.w.toLowerCase().indexOf(q)>=0 || w.cn.toLowerCase().indexOf(q)>=0 || w.syn.toLowerCase().indexOf(q)>=0; }
    return true;
  });
}

/* ===================== 听写（只听发音拼单词） ===================== */
var DC=null;
function startDict(){
  if(!GPool.length){ toast('这组没有词'); return; }
  var pool=shuffle(GPool.slice()).slice(0,Math.min(15,GPool.length));
  DC={ids:pool.map(function(w){return w.id;}), pos:0, correct:0, wrong:0, revealed:false, tries:0, hintN:0, countedWrong:false};
  renderDict();
}
function renderDict(){
  if(DC.pos>=DC.ids.length){ return dictDone(); }
  var w=byId[DC.ids[DC.pos]]; DC.revealed=false; DC.tries=0; DC.hintN=0; DC.countedWrong=false;
  var letters=w.w.replace(/[^a-z]/gi,'').length;
  var phrase=/\s/.test(w.w);
  view.innerHTML=
    '<div class="session-top"><button class="x" onclick="go(\'play\')">✕</button>'+
      '<div class="pbar"><i style="width:'+Math.round(DC.pos/DC.ids.length*100)+'%"></i></div>'+
      '<div class="pcount">'+(DC.pos+1)+' / '+DC.ids.length+'</div></div>'+
    '<div class="card spcard">'+
      '<div class="dc-ear">🎧 听发音，拼出你听到的单词</div>'+
      '<button class="speak big" id="dcPlay" onclick="speak(\''+jx(w.w)+'\',this)">🔊 再听一遍</button>'+
      '<div class="dc-meta">'+letters+' 个字母'+(phrase?' · 词组（含空格）':'')+'</div>'+
      '<input class="sp-input" id="dcIn" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="把听到的拼在这里">'+
      '<div id="dcMsg"></div>'+
      '<button class="dc-cn" id="dcCnBtn" onclick="dictPeekCn()">🤔 想不起？看中文提示</button>'+
    '</div>'+
    '<div class="sp-actions"><button class="btn ghost" onclick="dictHint()">提示首字母</button><button class="btn honey" onclick="dictCheck()">检查</button></div>'+
    '<div class="sp-actions" style="margin-top:10px"><button class="btn ghost" onclick="dictReveal()">看答案 · 下一个</button></div>';
  var inp=document.getElementById('dcIn'); if(inp){ inp.focus(); inp.addEventListener('keydown',function(e){ if(e.key==='Enter')dictCheck(); }); }
  setTimeout(function(){ var b=document.getElementById('dcPlay'); if(b) speak(w.w,b); }, 300);
}
function dictPeekCn(){ var w=byId[DC.ids[DC.pos]]; var el=document.getElementById('dcCnBtn'); if(el){ el.outerHTML='<div class="dc-cnshow">中文：'+esc(w.cn)+'</div>'; } }
function dictHint(){
  var w=byId[DC.ids[DC.pos]];
  var n=Math.min((DC.hintN||0)+1, w.w.length); DC.hintN=n;
  var shown=w.w.split('').map(function(ch,i){ return i<n?ch:(/[a-z]/i.test(ch)?'_':ch); }).join(' ');
  var m=document.getElementById('dcMsg'); if(m) m.innerHTML='<div class="qhint">'+shown+'</div>';
}
function dictCheck(){
  var w=byId[DC.ids[DC.pos]]; var inp=document.getElementById('dcIn'); if(!inp) return;
  var val=(inp.value||'').trim().toLowerCase().replace(/\s+/g,' ');
  if(!val) return;
  if(val===w.w.toLowerCase()){
    inp.classList.remove('no'); inp.classList.add('ok');
    document.getElementById('dcMsg').innerHTML='<div class="sp-reveal">✓ '+esc(w.w)+'</div><div class="dc-cnshow" style="margin-top:6px">'+esc(w.cn)+'</div>';
    if(DC.tries===0 && !DC.revealed){ DC.correct++; if(S.wrong[w.id])delete S.wrong[w.id]; save(); }
    speak(w.w);
    setTimeout(function(){ DC.pos++; renderDict(); }, 950);
  } else {
    DC.tries++; inp.classList.add('no');
    if(DC.tries===1){ document.getElementById('dcMsg').innerHTML='<div class="qhint" style="background:var(--coral-soft);color:var(--coral-d)">还不对，再听一遍试试，或点「提示首字母」</div>'; var b=document.getElementById('dcPlay'); if(b)speak(w.w,b); }
    else { document.getElementById('dcMsg').innerHTML='<div class="qhint" style="background:var(--coral-soft);color:var(--coral-d)">正确拼写：<b>'+esc(w.w)+'</b>　('+esc(w.cn)+')</div>'; if(!DC.countedWrong){ DC.wrong++; S.wrong[w.id]=1; save(); DC.countedWrong=true; } }
  }
}
function dictReveal(){
  var w=byId[DC.ids[DC.pos]];
  if(!DC.revealed && DC.tries===0 && !DC.countedWrong){ DC.wrong++; S.wrong[w.id]=1; save(); }
  DC.revealed=true; DC.pos++; renderDict();
}
function dictDone(){
  var total=DC.ids.length, c=DC.correct; DC=null;
  var rate=total?Math.round(c/total*100):0; var emoji=rate>=80?'🏆':rate>=50?'💪':'📚';
  view.innerHTML='<div class="card summary"><div style="font-size:42px">'+emoji+'</div>'+
    '<div class="big" style="margin-top:8px;color:var(--honey-d)">'+c+' / '+total+'</div><div class="lab">一次听写正确</div>'+
    '<div style="display:flex;flex-direction:column;gap:10px;margin-top:18px">'+
      '<button class="btn honey" onclick="gameSetup(\'dict\')">再听写一组</button>'+
      '<button class="btn ghost" onclick="go(\'play\')">回到测试</button>'+
    '</div></div>';
}

var W2R=null;
function rootOf(word){
  if(!W2R){ W2R={}; ROOTS.forEach(function(R,i){ R.ex.forEach(function(e){ var k=e.w.toLowerCase(); if(!(k in W2R))W2R[k]=i; }); }); }
  var k=String(word||'').toLowerCase();
  return (k in W2R)? W2R[k] : -1;
}
function rootWordsHTML(R){
  return R.ex.map(function(e){
    var inLib=byWord[e.w.toLowerCase()];
    var isHead=!!gFind(e.w);
    var tag=isHead?'<span class="kbadge">考点词</span>':'';
    var en=(inLib!==undefined)?'<span class="rw-en link" onclick="openWord('+inLib+')">'+esc(e.w)+'</span>':'<span class="rw-en">'+esc(e.w)+'</span>';
    return '<div class="rword">'+
      '<div class="rw-h">'+en+tag+'<button class="pp-sp" onclick="event.stopPropagation();speak(\''+jx(e.w)+'\',this)">🔊</button></div>'+
      '<div class="rw-cn">'+esc(e.cn)+'</div>'+
      '<div class="rw-eg">'+esc(e.eg)+'</div>'+
      '<div class="rw-egcn">'+esc(e.egcn)+'</div>'+
    '</div>';
  }).join('');
}
function renderRoots(){
  view.innerHTML=
   '<div class="session-top"><button class="x" onclick="go(\'play\')">✕</button><div style="flex:1;font-weight:800">🌱 词根记忆法</div></div>'+
   '<div class="note" style="margin-top:0">记住一个词根，就能顺藤摸瓜记住一串雅思词。标「考点词」的是本词库收录的词，可点开看详情、加收藏。共 '+ROOTS.length+' 组常用词根。</div>'+
   '<div class="rootlist">'+
     ROOTS.map(function(R,i){
       var kn=R.ex.filter(function(e){return gFind(e.w);}).length;
       return '<button class="card rootcard" onclick="openRootDetail('+i+')">'+
         '<div class="rt"><b>'+esc(R.r)+'</b><span class="rm">'+esc(R.m)+'</span></div>'+
         '<div class="rmeta">'+R.ex.length+' 词'+(kn?' · '+kn+' 考点':'')+' <span class="arrow">›</span></div></button>';
     }).join('')+
   '</div>';
}
function openRootDetail(i){
  var R=ROOTS[i];
  view.innerHTML=
   '<div class="session-top"><button class="x" onclick="renderRoots()">‹</button><div style="flex:1;font-weight:800">词根 '+esc(R.r)+'</div></div>'+
   '<div class="card roothero"><div class="rh-r">'+esc(R.r)+'</div><div class="rh-m">'+esc(R.m)+'</div></div>'+
   '<div class="rwords">'+rootWordsHTML(R)+'</div>'+
   '<div class="note">💡 把这一串词连读两遍。下次遇到带 “'+esc(R.r)+'” 的陌生词，就能猜出大概意思。</div>';
}
function openRootModal(i){
  var R=ROOTS[i];
  openModal('<div class="center"><div class="rh-r" style="font-size:30px">'+esc(R.r)+'</div><div class="rh-m" style="margin-top:2px">'+esc(R.m)+'</div></div><div class="rwords" style="margin-top:10px">'+rootWordsHTML(R)+'</div>');
}
